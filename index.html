<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bills Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#639922">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bills">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;overflow-x:hidden}

    /* ── LOGIN ── */
    #loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
    .login-icon{width:80px;height:80px;background:#639922;border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:40px}
    .login-title{font-size:28px;font-weight:700;margin-bottom:8px}
    .login-sub{font-size:15px;color:#666;line-height:1.5;max-width:280px;margin:0 auto 2rem}
    .btn-google{display:flex;align-items:center;gap:12px;padding:13px 24px;background:#fff;border:1px solid #ddd;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:box-shadow .2s}
    .btn-google:hover{box-shadow:0 2px 10px rgba(0,0,0,.12)}
    .google-logo{width:20px;height:20px}
    .login-error{margin-top:12px;font-size:13px;color:#ef4444}

    /* ── APP SHELL ── */
    #mainApp{display:none;min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e8e8e0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .topbar-title{font-size:17px;font-weight:700;color:#639922}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .user-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;display:none}
    .btn-signout{background:none;border:none;cursor:pointer;color:#aaa;font-size:13px;font-family:inherit;padding:4px 8px}
    .scroll-content{padding:16px 16px calc(80px + env(safe-area-inset-bottom,0px))}
    .panel{display:none}.panel.active{display:block}
    .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid #e8e8e0;display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
    .tabbar-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:3px;background:none;border:none;cursor:pointer;color:#bbb;font-size:10px;font-weight:600;font-family:inherit;transition:color .15s}
    .tabbar-item i{font-size:22px}
    .tabbar-item.active{color:#639922}

    /* ── SHARED COMPONENTS ── */
    .card{background:#fff;border-radius:16px;border:1px solid #e8e8e0;padding:16px;margin-bottom:12px}
    .slabel{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#aaa;margin:16px 0 8px}
    .slabel:first-child{margin-top:0}
    .empty{text-align:center;padding:3rem 1rem;color:#bbb;font-size:14px}
    .empty i{font-size:38px;display:block;margin-bottom:10px}
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
    .field:last-child{margin-bottom:0}
    .field label{font-size:12px;font-weight:700;color:#555}
    .field input,.field select{width:100%;min-width:0;height:44px;border:1px solid #e0e0d8;border-radius:10px;padding:0 12px;font-size:15px;background:#fafaf8;color:#1a1a18;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
    .field input:focus,.field select:focus{border-color:#639922;background:#fff}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .toggle-row{display:flex;align-items:center;gap:12px;padding:12px;background:#fafaf8;border-radius:10px;border:1px solid #e8e8e0;margin-bottom:10px}
    .toggle-label{flex:1}
    .toggle-label strong{font-size:14px;font-weight:600;display:block}
    .toggle-label span{font-size:12px;color:#888}
    .toggle{position:relative;width:46px;height:26px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:#ddd;border-radius:26px;cursor:pointer;transition:background .2s}
    .slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .toggle input:checked+.slider{background:#639922}
    .toggle input:checked+.slider::before{transform:translateX(20px)}
    .btn-primary{width:100%;height:48px;background:#639922;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s;margin-top:4px}
    .btn-primary:hover{background:#527f1c}
    .btn-primary:active{transform:scale(.98)}
    .btn-primary:disabled{background:#bbb;cursor:not-allowed;transform:none}
    .badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
    .badge-dd{background:#dbeafe;color:#1e40af}
    .badge-exc{background:#f3f4f6;color:#666}
    .badge-adj{background:#fef3c7;color:#92400e}
    .badge-skip{background:#f3f4f6;color:#9ca3af}

    /* ── TODAY TAB ── */
    .send-btn{width:100%;height:50px;background:#639922;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;transition:background .15s}
    .send-btn:hover{background:#527f1c}
    .setup-card{background:#fff;border:2px dashed #e0e0d8;border-radius:16px;padding:20px;margin-bottom:12px;text-align:center}
    .setup-card p{color:#888;font-size:14px;margin-bottom:14px;line-height:1.5}
    .transfer-card{background:#fff;border:2px solid #639922;border-radius:16px;padding:16px;margin-bottom:14px}
    .transfer-main{font-size:14px;color:#555;margin-bottom:4px}
    .transfer-amount{font-size:38px;font-weight:700;color:#639922;line-height:1;margin-bottom:12px}
    .transfer-rows{display:flex;flex-direction:column;gap:8px;border-top:1px solid #e8e8e0;padding-top:12px}
    .transfer-row{display:flex;justify-content:space-between;align-items:center;font-size:14px}
    .transfer-row .label{color:#555}
    .transfer-row .val{font-weight:700}
    .dd-breakdown{margin-top:6px;padding:8px 12px;background:#f5f5f0;border-radius:8px;display:flex;flex-direction:column;gap:4px}
    .dd-breakdown-row{display:flex;justify-content:space-between;font-size:12px;color:#666}
    .progress-wrap{background:#e8e8e0;border-radius:6px;height:6px;overflow:hidden;margin:4px 0 2px}
    .progress-fill{height:100%;border-radius:6px;background:#639922;transition:width .4s}
    .progress-label{font-size:12px;color:#888;margin-bottom:10px}

    /* bill check rows */
    .check-section-header{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#aaa;margin:14px 0 6px;display:flex;align-items:center;justify-content:space-between}
    .check-list{display:flex;flex-direction:column;gap:7px;margin-bottom:6px}
    .check-row{background:#fff;border:1px solid #e8e8e0;border-radius:13px;padding:11px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;transition:opacity .2s}
    .check-row.done{opacity:.42}
    .check-row.done .check-name{text-decoration:line-through;color:#aaa}
    .check-row.overdue{border-color:#fecaca}
    .check-row.skipped{opacity:.45;border-style:dashed}
    .check-row.frompay{background:#fafaf8;border-color:#f0f0e8}
    .check-circle{width:26px;height:26px;border-radius:50%;border:2px solid #ddd;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:transparent}
    .check-circle.on{background:#639922;border-color:#639922;color:#fff}
    .check-circle.ban{background:#e5e7eb;border-color:#e5e7eb;color:#9ca3af;cursor:default}
    .check-info{flex:1;min-width:0}
    .check-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
    .check-sub{font-size:11px;color:#888;margin-top:2px}
    .check-amt{font-size:14px;font-weight:700;flex-shrink:0}
    .check-pencil{background:none;border:none;cursor:pointer;color:#ccc;padding:4px;border-radius:6px;display:flex;align-items:center;flex-shrink:0;transition:color .15s,background .15s}
    .check-pencil:hover{color:#639922;background:#f0fdf4}
    .fn-partial{flex:0 0 100%;display:flex;align-items:center;gap:8px;padding-top:10px;margin-top:4px;border-top:1px solid #f0f0e8;flex-wrap:wrap}
    .fn-partial label{font-size:12px;color:#888;flex-shrink:0}
    .fn-partial input{flex:1;min-width:100px;height:36px;border:1px solid #e0e0d8;border-radius:8px;padding:0 10px;font-size:14px;background:#fafaf8;color:#1a1a18;font-family:inherit;outline:none}
    .fn-partial input:focus{border-color:#639922;background:#fff}
    .fn-partial .p-save{height:36px;padding:0 14px;background:#639922;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
    .fn-partial .p-save:hover{background:#527f1c}
    .fn-partial .p-clear{height:36px;padding:0 10px;background:none;color:#aaa;border:1px solid #e0e0d8;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0}
    .fn-partial .p-clear:hover{color:#ef4444;border-color:#fecaca}
    .record-btn{width:100%;height:52px;background:#1e40af;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;transition:background .15s}
    .record-btn:hover{background:#1d3a9f}
    .undo-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;margin-top:8px;font-size:13px;color:#92400e}
    .undo-bar button{background:#92400e;color:#fff;border:none;border-radius:7px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
    .large-bills-card{border-left:3px solid #ef4444;padding-left:12px;margin-bottom:12px}
    .large-bill-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0e8;font-size:13px}
    .large-bill-row:last-child{border-bottom:none}

    /* ── FUND TAB ── */
    .balance-card{background:#fff;border-radius:16px;border:1px solid #e8e8e0;padding:16px;margin-bottom:12px}
    .balance-input-row{display:flex;gap:10px;align-items:flex-end}
    .balance-input-row .field{flex:1;margin-bottom:0}
    .balance-save-btn{height:44px;padding:0 18px;background:#639922;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;transition:background .15s}
    .balance-save-btn:hover{background:#527f1c}
    .status-card{background:#fff;border-radius:16px;border:1px solid #e8e8e0;padding:16px;margin-bottom:12px}
    .status-main{font-size:32px;font-weight:700;color:#639922;margin:4px 0 8px}
    .status-sub{font-size:13px;color:#666;margin-bottom:4px}
    .status-rows{display:flex;flex-direction:column;gap:7px;border-top:1px solid #e8e8e0;padding-top:12px;margin-top:4px}
    .status-row{display:flex;justify-content:space-between;font-size:13px}
    .status-row .lbl{color:#888}
    .status-row .val{font-weight:600}
    .collapsible-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:12px;border:1px solid #e8e8e0;cursor:pointer;margin-bottom:4px;font-size:14px;font-weight:600;color:#333;user-select:none}
    .collapsible-header i{font-size:18px;color:#aaa;transition:transform .2s}
    .collapsible-header.open i{transform:rotate(180deg)}
    .collapsible-body{display:none;margin-bottom:12px}
    .collapsible-body.open{display:block}
    .settings-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}

    /* lookahead table */
    .lookahead-wrap{overflow-x:auto}
    table.la{width:100%;border-collapse:collapse;font-size:12px;min-width:360px}
    table.la th{padding:7px 4px;text-align:right;color:#888;font-weight:700;border-bottom:2px solid #e8e8e0}
    table.la th:first-child{text-align:left}
    table.la td{padding:8px 4px;text-align:right;border-bottom:1px solid #f0f0e8}
    table.la td:first-child{text-align:left;font-weight:600;color:#333}
    table.la tr.neg{background:#fef2f2}

    /* ── BILLS TAB ── */
    .sort-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .sort-btn{height:30px;padding:0 12px;border:1px solid #e0e0d8;border-radius:8px;background:#fafaf8;color:#666;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
    .sort-btn.active{background:#639922;color:#fff;border-color:#639922}
    .bill-list{display:flex;flex-direction:column;gap:8px}
    .bill-item{background:#fff;border:1px solid #e8e8e0;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px}
    .bill-cat{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .bill-info{flex:1;min-width:0}
    .bill-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
    .bill-meta{font-size:11px;color:#888;margin-top:2px}
    .bill-right{text-align:right;flex-shrink:0}
    .bill-amt{font-size:14px;font-weight:700}
    .bill-fn{font-size:11px;color:#888}
    .btn-del{background:none;border:none;cursor:pointer;color:#ccc;padding:5px;border-radius:7px;display:flex;align-items:center;flex-shrink:0;transition:color .15s,background .15s}
    .btn-del:hover{color:#ef4444;background:#fef2f2}
    .btn-edit-sm{background:none;border:none;cursor:pointer;color:#ccc;padding:5px;border-radius:7px;display:flex;align-items:center;flex-shrink:0;transition:color .15s,background .15s}
    .btn-edit-sm:hover{color:#639922;background:#f0fdf4}
    .error-msg{font-size:12px;color:#ef4444;margin:6px 0;display:none}

    /* ── OVERLAYS ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center}
    .overlay-card{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
    .overlay-card h2{font-size:16px;font-weight:700;margin-bottom:16px}
    .overlay-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .overlay-close{background:none;border:none;cursor:pointer;color:#aaa;font-size:22px;line-height:1}
    .export-text{width:100%;font-family:monospace;font-size:12px;line-height:1.6;background:#f5f5f0;border:1px solid #e8e8e0;border-radius:10px;padding:12px;resize:none;color:#1a1a18}
    .saving-toast{position:fixed;top:62px;right:14px;z-index:300;background:#1a1a18;color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;opacity:0;transition:opacity .25s;pointer-events:none}
    .saving-toast.show{opacity:1}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-icon">💰</div>
  <h1 class="login-title">Bills Tracker</h1>
  <p class="login-sub">Know exactly what to set aside every payday.</p>
  <button class="btn-google" onclick="signIn()">
    <svg class="google-logo" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>
  <p class="login-error" id="loginError"></p>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <header class="topbar">
    <span class="topbar-title">💰 Bills Tracker</span>
    <div class="topbar-right">
      <img class="user-avatar" id="userAvatar" src="" alt="Profile">
      <button class="btn-signout" onclick="doSignOut()">Sign out</button>
    </div>
  </header>
  <main class="scroll-content">
    <div class="panel active" id="panel-today"></div>
    <div class="panel"        id="panel-fund"></div>
    <div class="panel"        id="panel-bills"></div>
  </main>
  <nav class="tabbar" aria-label="Main navigation">
    <button class="tabbar-item active" id="tab-today" onclick="switchTab('today')"><i class="ti ti-calendar-check" aria-hidden="true"></i>Today</button>
    <button class="tabbar-item"        id="tab-fund"  onclick="switchTab('fund')"><i class="ti ti-piggy-bank" aria-hidden="true"></i>Fund</button>
    <button class="tabbar-item"        id="tab-bills" onclick="switchTab('bills')"><i class="ti ti-list" aria-hidden="true"></i>My Bills</button>
  </nav>
</div>
<div class="saving-toast" id="toast">Saved ✓</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const FREQ_LABELS={oneoff:'One-off',weekly:'Weekly',fortnightly:'Fortnightly','6weekly':'6-Weekly',monthly:'Monthly',quarterly:'Quarterly',annual:'Annual'};
const FREQ_COLORS={oneoff:{bg:'#f3f4f6',color:'#555'},weekly:{bg:'#dcfce7',color:'#166534'},fortnightly:{bg:'#d1fae5',color:'#065f46'},'6weekly':{bg:'#fce7f3',color:'#9d174d'},monthly:{bg:'#dbeafe',color:'#1e40af'},quarterly:{bg:'#fef3c7',color:'#92400e'},annual:{bg:'#ede9fe',color:'#5b21b6'}};
const CAT_ICONS={home:'🏠',utilities:'⚡',subscriptions:'📱',insurance:'🛡️',transport:'🚗',health:'❤️',other:'📋'};
const CAT_BG={home:'#dcfce7',utilities:'#fef3c7',subscriptions:'#dbeafe',insurance:'#ede9fe',transport:'#d1fae5',health:'#fee2e2',other:'#f3f4f6'};
const TO_FN={oneoff:0,weekly:52/26,fortnightly:1,'6weekly':(52/6)/26,monthly:12/26,quarterly:4/26,annual:1/26};
const TO_YR={oneoff:0,weekly:52,fortnightly:26,'6weekly':52/6,monthly:12,quarterly:4,annual:1};

// ─── STATE ────────────────────────────────────────────────────────────────────
let bills=[],paidKeys=[],ddOvrKeys=[],paidAmounts={},historyAmounts={},skippedKeys=[];
let settings={balance:0,balanceDate:tod(),paydayDate:'',paydayPay:0,paydayFreq:'fortnightly',billsSortBy:'due'};
let uid=null,db=null,saveTimer=null,editingId=null,cachedSafePace=0;

// ─── RECURRENCE ───────────────────────────────────────────────────────────────
function addCycle(d,freq){switch(freq){case'weekly':return d.add(1,'week');case'fortnightly':return d.add(2,'week');case'6weekly':return d.add(6,'week');case'monthly':return d.add(1,'month');case'quarterly':return d.add(3,'month');case'annual':return d.add(1,'year');default:return d.add(2,'week');}}
function prevCycle(d,freq){switch(freq){case'weekly':return d.subtract(1,'week');case'fortnightly':return d.subtract(2,'week');case'6weekly':return d.subtract(6,'week');case'monthly':return d.subtract(1,'month');case'quarterly':return d.subtract(3,'month');case'annual':return d.subtract(1,'year');default:return d.subtract(2,'week');}}
function nextDueOnOrAfter(bill,fromDj){
  let d=dayjs(bill.date);
  if(bill.freq==='oneoff') return d;
  if(!d.isBefore(fromDj)) return d;
  const approx={weekly:7,fortnightly:14,'6weekly':42,monthly:30.44,quarterly:91.31,annual:365.25}[bill.freq]||14;
  const skip=Math.max(0,Math.floor(fromDj.diff(d,'day')/approx)-2);
  for(let i=0;i<skip;i++) d=addCycle(d,bill.freq);
  while(d.isBefore(fromDj)) d=addCycle(d,bill.freq);
  return d;
}
function occurrencesInRange(bill,startDj,endDj){
  if(bill.freq==='oneoff'){const d=dayjs(bill.date);return(!d.isBefore(startDj)&&!d.isAfter(endDj))?[d.format('YYYY-MM-DD')]:[];}
  const dates=[];let d=nextDueOnOrAfter(bill,startDj);
  while(!d.isAfter(endDj)){dates.push(d.format('YYYY-MM-DD'));d=addCycle(d,bill.freq);}
  return dates;
}
function getOverdueOccurrences(bill,targetDj){
  if(bill.freq==='oneoff'){const d=dayjs(bill.date);if(d.isBefore(targetDj)&&!isPaidOcc(bill.id,bill.date))return[bill.date];return[];}
  const nxt=nextDueOnOrAfter(bill,targetDj),prv=prevCycle(nxt,bill.freq);
  if(prv.isBefore(targetDj)&&!prv.isBefore(dayjs(bill.date))){const ds=prv.format('YYYY-MM-DD');if(!isPaidOcc(bill.id,ds))return[ds];}
  return[];
}

// ─── PAID STATE ───────────────────────────────────────────────────────────────
function occKey(id,ds){return`${id}_${ds}`;}
function isSkipped(id,ds){return skippedKeys.includes(occKey(id,ds));}
function isPaidOcc(id,ds){
  if(isSkipped(id,ds)) return true;
  const bill=bills.find(b=>b.id===id);if(!bill) return false;
  if(bill.dd){if(ddOvrKeys.includes(occKey(id,ds))) return false;return true;}
  return getAmtPaid(bill,ds)>=getExpectedAmount(bill,ds);
}
function getExpectedAmount(bill,ds){const k=occKey(bill.id,ds);return historyAmounts[k]!==undefined?historyAmounts[k]:bill.amount;}
function getAmtPaid(bill,ds){const k=occKey(bill.id,ds);if(paidKeys.includes(k)) return getExpectedAmount(bill,ds);if(paidAmounts[k]!==undefined) return paidAmounts[k];return 0;}

// ─── MISC ─────────────────────────────────────────────────────────────────────
function tod(){return new Date().toISOString().split('T')[0];}
function toFn(a,f){return a*(TO_FN[f]??1);}
function toYr(a,f){return a*(TO_YR[f]??1);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── SAFE PACE ENGINE ─────────────────────────────────────────────────────────
function getPayCycleDates(startDj,freq,index){
  if(freq==='weekly')  return{start:startDj.add(index,'week'),end:startDj.add(index,'week').add(6,'day')};
  if(freq==='monthly') return{start:startDj.add(index,'month'),end:startDj.add(index,'month').add(1,'month').subtract(1,'day')};
  return{start:startDj.add(index*2,'week'),end:startDj.add(index*2,'week').add(13,'day')};
}
function calculateSafePace(){
  const fundBills=bills.filter(b=>!b.fundExclude);
  if(!fundBills.length) return 0;
  const balance=settings.balance||0;
  const simStart=dayjs(settings.paydayDate||tod());
  const balanceDj=dayjs(settings.balanceDate||tod());
  const freq=settings.paydayFreq||'fortnightly';
  const cyclesCount=freq==='weekly'?156:(freq==='monthly'?36:78);
  const balReadjust=balanceDj.isAfter(simStart)||balanceDj.isSame(simStart,'day');
  let odAmt=0;
  fundBills.forEach(b=>getOverdueOccurrences(b,simStart).forEach(ds=>{odAmt+=Math.max(getExpectedAmount(b,ds)-getAmtPaid(b,ds),0);}));
  let maxRate=0,running=0;
  for(let k=1;k<=cyclesCount;k++){
    const dates=getPayCycleDates(simStart,freq,k-1);let cyc=0;
    fundBills.forEach(b=>occurrencesInRange(b,dates.start,dates.end).forEach(ds=>{if(!isSkipped(b.id,ds)) cyc+=getExpectedAmount(b,ds);}));
    running+=cyc;
    const denom=balReadjust?Math.max(k-1,1):k;
    const rate=(running+odAmt-balance)/denom;
    if(rate>maxRate) maxRate=rate;
  }
  return Math.max(maxRate,0);
}

// ─── TODAY TAB ────────────────────────────────────────────────────────────────
function renderToday(safePace){
  if(safePace===undefined) safePace=cachedSafePace||calculateSafePace();
  const pv=settings.paydayDate;
  const freq=settings.paydayFreq||'fortnightly';

  // No setup yet
  if(!pv){
    document.getElementById('panel-today').innerHTML=`
      <div class="setup-card">
        <i class="ti ti-calendar-dollar" style="font-size:36px;color:#639922;display:block;margin-bottom:12px"></i>
        <p>Set up your payday details to get started. You can update these any time in the <strong>Fund</strong> tab.</p>
        <button class="btn-primary" style="max-width:220px;margin:0 auto" onclick="switchTab('fund')">
          <i class="ti ti-settings" aria-hidden="true"></i> Set up payday
        </button>
      </div>
      ${!bills.length?'<div class="empty"><i class="ti ti-list" aria-hidden="true"></i>Add your bills in <strong>My Bills</strong></div>':''}`;
    return;
  }

  const pay=settings.paydayPay||0;
  const start=dayjs(pv);
  const dates=getPayCycleDates(start,freq,0);
  const fundBills=bills.filter(b=>!b.fundExclude);

  // DD amount this cycle
  let ddAmt=0;const ddItems=[];
  fundBills.filter(b=>b.dd).forEach(b=>{
    occurrencesInRange(b,dates.start,dates.end).forEach(ds=>{
      if(!isSkipped(b.id,ds)){const a=getExpectedAmount(b,ds);ddAmt+=a;ddItems.push({name:b.name,amount:a,due:dayjs(ds).format('D MMM')});}
    });
  });
  ddItems.sort((a,b)=>a.due.localeCompare(b.due));
  const transferAmt=Math.max(safePace-ddAmt,0);
  let fromPayAmt=0;
  bills.filter(b=>b.fundExclude).forEach(b=>occurrencesInRange(b,dates.start,dates.end).forEach(ds=>{fromPayAmt+=getExpectedAmount(b,ds);}));
  const disposable=pay>0?pay-safePace-fromPayAmt:null;

  // Transfer card
  const transferCard=`
    <div class="transfer-card">
      <div class="transfer-main">Transfer to bills account</div>
      <div class="transfer-amount">$${transferAmt.toFixed(2)}</div>
      <div class="transfer-rows">
        ${ddAmt>0?`<div class="transfer-row"><span class="label">🏦 Keep for direct debits</span><span class="val">$${ddAmt.toFixed(2)}</span></div>
        <div class="dd-breakdown">${ddItems.map(d=>`<div class="dd-breakdown-row"><span>${esc(d.name)} · due ${d.due}</span><span>$${d.amount.toFixed(2)}</span></div>`).join('')}</div>`:''}
        ${disposable!==null?`<div class="transfer-row" style="margin-top:4px"><span class="label">🎈 Spending money left</span><span class="val" style="color:${disposable<0?'#ef4444':'#1e40af'}">~$${Math.max(disposable,0).toFixed(2)}</span></div>`:''}
      </div>
    </div>`;

  // Overdue
  const odOccs=[];
  fundBills.forEach(b=>getOverdueOccurrences(b,start).forEach(ds=>odOccs.push({bill:b,ds})));

  // This cycle
  const fnOccs=[];
  bills.forEach(b=>occurrencesInRange(b,dates.start,dates.end).forEach(ds=>fnOccs.push({bill:b,ds})));
  const cycFund=fnOccs.filter(o=>!o.bill.fundExclude);
  const cycPay =fnOccs.filter(o=> o.bill.fundExclude);

  // Progress (overdue + fund this cycle, excluding from-pay)
  const allFundOccs=[...odOccs,...cycFund];
  const handled=allFundOccs.filter(o=>isPaidOcc(o.bill.id,o.ds)).length;
  const total=allFundOccs.length;
  const pct=total>0?Math.round(handled/total*100):100;

  const progressHtml=total>0?`
    <div class="progress-label">${handled} of ${total} bills handled</div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>`:
    `<div class="progress-label" style="color:#639922">✓ All bills handled this cycle</div>`;

  // Render a check row
  const checkRow=(o,isOverdue=false)=>{
    const expAmt=getExpectedAmount(o.bill,o.ds);
    const amtPaid=getAmtPaid(o.bill,o.ds);
    const skipped=isSkipped(o.bill.id,o.ds);
    const paid=isPaidOcc(o.bill.id,o.ds);
    const partial=!paid&&!skipped&&amtPaid>0&&amtPaid<expAmt;
    const adjusted=!skipped&&historyAmounts[occKey(o.bill.id,o.ds)]!==undefined;
    const itemId=`ci-${o.bill.id}-${o.ds}`;
    const dueLabel=isOverdue?`Was due ${dayjs(o.ds).format('D MMM')} · overdue`:
      `Due ${dayjs(o.ds).format('ddd D MMM')}${o.bill.dd?' · DD scheduled':''}`;

    if(skipped) return `<div class="check-row skipped" id="${itemId}">
      <div class="check-circle ban"><i class="ti ti-ban" style="font-size:12px"></i></div>
      <div class="check-info">
        <div class="check-name" style="color:#9ca3af">${esc(o.bill.name)}<span class="badge badge-skip">Skipped</span></div>
        <div class="check-sub">${dueLabel}</div>
      </div>
      <span class="check-amt" style="color:#9ca3af">—</span>
      <button class="check-pencil" onclick="showBillAdjust('${o.bill.id}','${o.ds}',${o.bill.amount},'${itemId}')" title="Restore"><i class="ti ti-pencil" style="font-size:14px"></i></button>
    </div>`;

    return `<div class="check-row ${paid?'done':''} ${isOverdue?'overdue':''}" id="${itemId}">
      <button class="check-circle ${paid?'on':''}"
        onclick="tapToday('${o.bill.id}','${o.ds}')"
        title="${o.bill.dd?(paid?'DD — tap to flag as failed':'DD — tap to confirm'):''}"
        aria-label="${paid?'Mark unpaid':'Mark paid'}: ${esc(o.bill.name)}">
        <i class="ti ti-check" style="font-size:13px"></i>
      </button>
      <div class="check-info">
        <div class="check-name">
          ${esc(o.bill.name)}
          ${o.bill.dd?'<span class="badge badge-dd">DD</span>':''}
          ${adjusted?'<span class="badge badge-adj">Adjusted</span>':''}
          ${isOverdue?'<span class="badge" style="background:#fee2e2;color:#991b1b;font-size:10px">Overdue</span>':''}
        </div>
        <div class="check-sub" style="${isOverdue&&!paid?'color:#ef4444':''}">
          ${dueLabel}
          ${partial?` · <span style="color:#639922;font-weight:600">Paid $${amtPaid.toFixed(2)} of $${expAmt.toFixed(2)}</span>`:''}
        </div>
      </div>
      <div class="check-amt" style="${isOverdue&&!paid?'color:#991b1b':''}">$${(expAmt-amtPaid).toFixed(2)}${partial?' left':''}</div>
      <button class="check-pencil" onclick="showBillAdjust('${o.bill.id}','${o.ds}',${o.bill.amount},'${itemId}')" title="Adjust / skip">
        <i class="ti ti-pencil" style="font-size:14px"></i>
      </button>
    </div>`;
  };

  const odHtml=odOccs.length===0?'':
    `<div class="check-section-header" style="color:#991b1b">⚠ Overdue</div>
    <div class="check-list">${odOccs.sort((a,b)=>a.ds.localeCompare(b.ds)).map(o=>checkRow(o,true)).join('')}</div>`;

  const fundHtml=cycFund.length===0?'':
    `<div class="check-section-header">From bills fund <span style="font-weight:400;color:#aaa">${dayjs(dates.start).format('D MMM')} – ${dayjs(dates.end).format('D MMM')}</span></div>
    <div class="check-list">${[...cycFund].sort((a,b)=>a.ds.localeCompare(b.ds)).map(o=>checkRow(o)).join('')}</div>`;

  const payHtml=cycPay.length===0?'':
    `<div class="check-section-header">From pay <span style="font-weight:400;color:#aaa">no fund contribution needed</span></div>
    <div class="check-list">${[...cycPay].sort((a,b)=>a.ds.localeCompare(b.ds)).map(o=>{
      const expAmt=getExpectedAmount(o.bill,o.ds);
      const itemId=`ci-${o.bill.id}-${o.ds}`;
      return `<div class="check-row frompay done" id="${itemId}">
        <div class="check-circle on" style="background:#bbb;border-color:#bbb"><i class="ti ti-check" style="font-size:13px"></i></div>
        <div class="check-info">
          <div class="check-name" style="color:#aaa">${esc(o.bill.name)}${o.bill.dd?'<span class="badge badge-dd">DD</span>':''}<span class="badge badge-exc">From pay</span></div>
          <div class="check-sub">Due ${dayjs(o.ds).format('ddd D MMM')}</div>
        </div>
        <div class="check-amt" style="color:#aaa">$${expAmt.toFixed(2)}</div>
        <button class="check-pencil" onclick="showBillAdjust('${o.bill.id}','${o.ds}',${o.bill.amount},'${itemId}')" title="Adjust"><i class="ti ti-pencil" style="font-size:14px"></i></button>
      </div>`;
    }).join('')}</div>`;

  // Record payday
  const nextCycle=getPayCycleDates(start,freq,1);
  const undoBar=settings.previousPaydayDate?
    `<div class="undo-bar">Recorded in error? Previous was ${dayjs(settings.previousPaydayDate).format('D MMM YYYY')}
    <button onclick="undoRecordPayday()">Undo</button></div>`:'';

  // Large upcoming bills (>$500 within 6 weeks)
  const todDj=dayjs(tod());const sixW=todDj.add(6,'week');
  const bigBills=[];
  bills.forEach(b=>occurrencesInRange(b,todDj,sixW).forEach(ds=>{
    const a=getExpectedAmount(b,ds);
    if(a>500&&!isPaidOcc(b.id,ds)) bigBills.push({name:b.name,amount:a,due:dayjs(ds).format('D MMM')});
  }));
  bigBills.sort((a,b)=>a.due.localeCompare(b.due));
  const bigHtml=bigBills.length===0?'':
    `<div class="slabel">⚡ Large bills coming up</div>
    <div class="card large-bills-card">${bigBills.map(b=>`<div class="large-bill-row"><span><strong>${esc(b.name)}</strong> · ${b.due}</span><span style="color:#ef4444;font-weight:700">$${b.amount.toFixed(2)}</span></div>`).join('')}</div>`;

  document.getElementById('panel-today').innerHTML=`
    <button class="send-btn" onclick="showExportMessage()">
      <i class="ti ti-send" aria-hidden="true"></i> Send payday instructions
    </button>
    <div style="font-size:12px;color:#888;margin-bottom:10px">Payday: <strong>${start.format('ddd D MMM YYYY')}</strong></div>
    ${!bills.length?`<div class="empty"><i class="ti ti-list"></i>Add your bills in <strong>My Bills</strong> to get started</div>`:`
    ${transferCard}
    ${progressHtml}
    ${bigHtml}
    ${odHtml}${fundHtml}${payHtml}
    <button class="record-btn" onclick="promptRecordPayday()">
      <i class="ti ti-circle-check" aria-hidden="true"></i>
      Done — next payday ${nextCycle.start.format('D MMM')} →
    </button>
    ${undoBar}`}`;
}

async function tapToday(billId,ds){
  const bill=bills.find(b=>b.id===billId);if(!bill) return;
  const k=occKey(billId,ds);
  if(bill.dd){ddOvrKeys=ddOvrKeys.includes(k)?ddOvrKeys.filter(x=>x!==k):[...ddOvrKeys,k];}
  else{paidKeys=paidKeys.includes(k)?paidKeys.filter(x=>x!==k):[...paidKeys,k];}
  renderToday(cachedSafePace);
  try{await savePaid();}catch(e){console.error(e);}
}

function promptRecordPayday(){
  const freq=settings.paydayFreq||'fortnightly';
  const next=getPayCycleDates(dayjs(settings.paydayDate||tod()),freq,1).start.format('D MMM YYYY');
  if(confirm(`Advance to next payday: ${next}?\n\nThis will reset the bill checklist for the new cycle.`)) recordPayday();
}
async function recordPayday(){
  const freq=settings.paydayFreq||'fortnightly';
  const next=getPayCycleDates(dayjs(settings.paydayDate||tod()),freq,1).start;
  settings.previousPaydayDate=settings.paydayDate;
  settings.paydayDate=next.format('YYYY-MM-DD');
  const cutoff=dayjs().subtract(90,'day').format('YYYY-MM-DD');
  paidKeys=paidKeys.filter(k=>k.slice(-10)>cutoff);
  ddOvrKeys=ddOvrKeys.filter(k=>k.slice(-10)>cutoff);
  skippedKeys=skippedKeys.filter(k=>k.slice(-10)>cutoff);
  const ca={};Object.entries(paidAmounts).forEach(([k,v])=>{if(k.slice(-10)>cutoff)ca[k]=v;});paidAmounts=ca;
  const ch={};Object.entries(historyAmounts).forEach(([k,v])=>{if(k.slice(-10)>cutoff)ch[k]=v;});historyAmounts=ch;
  try{
    await Promise.all([db.doc(`users/${uid}/meta/settings`).set(settings,{merge:true}),savePaid()]);
    toast('Payday recorded ✓');
  }catch(e){toast('Save failed — try again');}
  renderAll();
}
async function undoRecordPayday(){
  if(!settings.previousPaydayDate) return;
  settings.paydayDate=settings.previousPaydayDate;
  settings.previousPaydayDate=null;
  try{await db.doc(`users/${uid}/meta/settings`).set(settings,{merge:true});toast('Undone ✓');}catch(e){}
  renderAll();
}

// ─── BILL ADJUST (used from Today tab) ───────────────────────────────────────

        style="flex:1;min-width:0;height:36px;border:1px solid #e0e0d8;border-radius:8px;padding:0 10px;font-size:14px;background:#fafaf8;font-family:inherit;outline:none"

async function setActualAmt(billId,ds,baseAmt,inputEl,itemId){
  const rawVal=parseFloat(inputEl.value);const amount=isNaN(rawVal)?baseAmt:rawVal;
  const k=occKey(billId,ds);
  if(amount<=0){delete historyAmounts[k];delete paidAmounts[k];paidKeys=paidKeys.filter(x=>x!==k);}
  else{historyAmounts[k]=amount;delete paidAmounts[k];if(!paidKeys.includes(k))paidKeys=[...paidKeys,k];skippedKeys=skippedKeys.filter(x=>x!==k);}
  renderAll();try{await savePaid();}catch(e){console.error(e);}
}
async function savePartialFromAdjust(billId,ds,itemId){
  const inputEl=document.getElementById(`partialInput-${occKey(billId,ds)}`);if(!inputEl) return;
  const amount=parseFloat(inputEl.value)||0;
  const bill=bills.find(b=>b.id===billId);
  const expAmt=bill?getExpectedAmount(bill,ds):0;
  const k=occKey(billId,ds);
  if(amount<=0){delete paidAmounts[k];paidKeys=paidKeys.filter(x=>x!==k);}
  else if(amount>=expAmt){delete paidAmounts[k];if(!paidKeys.includes(k))paidKeys=[...paidKeys,k];}
  else{paidAmounts[k]=amount;paidKeys=paidKeys.filter(x=>x!==k);}
  renderAll();try{await savePaid();}catch(e){console.error(e);}
}
async function skipOccurrence(billId,ds,itemId){
  const k=occKey(billId,ds);

  else{skippedKeys=[...skippedKeys,k];paidKeys=paidKeys.filter(x=>x!==k);ddOvrKeys=ddOvrKeys.filter(x=>x!==k);delete paidAmounts[k];}
  renderAll();try{await savePaid();}catch(e){console.error(e);}
}
async function clearAdjustments(billId,ds,itemId){

  delete historyAmounts[k];delete paidAmounts[k];

}

function showExportMessage(){
  const pay=settings.paydayPay||0,pv=settings.paydayDate||tod(),freq=settings.paydayFreq||'fortnightly';
  const sp=cachedSafePace||calculateSafePace();
  const start=dayjs(pv),dates=getPayCycleDates(start,freq,0);
  let fromPayAmt=0,ddAmt=0;const ddItems=[];
  bills.forEach(b=>occurrencesInRange(b,dates.start,dates.end).forEach(ds=>{
    if(isSkipped(b.id,ds)) return;
    const a=getExpectedAmount(b,ds);
    if(b.fundExclude) fromPayAmt+=a;
    else if(b.dd){ddAmt+=a;ddItems.push({name:b.name,amount:a,due:dayjs(ds).format('ddd D MMM')});}
  }));
  ddItems.sort((a,b)=>a.due.localeCompare(b.due));
  const transfer=Math.max(sp-ddAmt,0),disc=pay-fromPayAmt-sp;
  const lines=[];
  if(fromPayAmt>0) lines.push(`  • $${fromPayAmt.toFixed(2)} for your regular payday bills.`);
  if(ddItems.length>0){
    lines.push(`  • Keep in your pay account for direct debits ($${ddAmt.toFixed(2)} total):`);
    ddItems.forEach(d=>lines.push(`      - ${d.name}: $${d.amount.toFixed(2)} (due ${d.due})`));
  }
  lines.push(`  • $${transfer.toFixed(2)} is transferred to your bills fund account.`);
  const msg=`This pay you will receive $${pay.toFixed(2)}.\nFrom this you will pay:\n\n${lines.join('\n')}\n\nThis leaves you with $${Math.max(disc,0).toFixed(2)} for discretionary spending.`;
  const ov=document.createElement('div');ov.className='overlay';ov.id='exportOv';
  ov.innerHTML=`<div class="overlay-card">
    <div class="overlay-top"><h2>📋 Payday instructions</h2><button class="overlay-close" onclick="document.getElementById('exportOv').remove()">✕</button></div>
    <textarea class="export-text" readonly rows="13" id="exportTxt">${msg}</textarea>

      <i class="ti ti-copy"></i> Copy to clipboard
    </button>
  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.getElementById('exportOv')?.remove();document.body.appendChild(ov);
}

function buildLookahead(safePace){
  const fundBills=bills.filter(b=>!b.fundExclude);
  if(!fundBills.length) return '<div class="empty" style="padding:1.5rem"><i class="ti ti-list"></i>Add bills to see the lookahead</div>';
  const freq=settings.paydayFreq||'fortnightly';
  const simStart=dayjs(settings.paydayDate||tod());
  const balanceDj=dayjs(settings.balanceDate||tod());
  const balReadjust=balanceDj.isAfter(simStart)||balanceDj.isSame(simStart,'day');
  const cyclesCount=freq==='weekly'?104:(freq==='monthly'?24:52);
  let odAmt=0;
  fundBills.forEach(b=>getOverdueOccurrences(b,simStart).forEach(ds=>{odAmt+=Math.max(getExpectedAmount(b,ds)-getAmtPaid(b,ds),0);}));
  let simBal=settings.balance||0;
  let rows='';
  for(let k=1;k<=cyclesCount;k++){
    const dates=getPayCycleDates(simStart,freq,k-1);let cyc=0;
    fundBills.forEach(b=>occurrencesInRange(b,dates.start,dates.end).forEach(ds=>{if(!isSkipped(b.id,ds))cyc+=getExpectedAmount(b,ds);}));
    if(k===1) cyc+=odAmt;
    const contrib=(k===1&&balReadjust)?0:safePace;
    simBal=simBal+contrib-cyc;
    const neg=simBal<-0.01;
    if(cyc>0||k===1||k===cyclesCount){
      rows+=`<tr${neg?' class="neg"':''}><td>${dates.start.format('D MMM YY')}</td><td style="color:#065f46">$${contrib.toFixed(0)}</td><td style="color:#991b1b">$${cyc.toFixed(0)}</td><td style="font-weight:700;color:${neg?'#ef4444':'#166534'}">$${simBal.toFixed(0)}</td></tr>`;
    }
  }
  return `<div class="lookahead-wrap" style="margin-bottom:12px"><table class="la"><thead><tr><th>Payday</th><th>In</th><th>Out</th><th>Balance</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

async function addBill(){
  const name=document.getElementById('bName').value.trim();
  const amount=parseFloat(document.getElementById('bAmt').value);
  const freq=document.getElementById('bFreq').value;
  const date=document.getElementById('bDate').value;
  const cat=document.getElementById('bCat').value;
  const dd=document.getElementById('bDD').checked;
  const fundExclude=document.getElementById('bExclude').checked;
  const err=document.getElementById('bErr'),btn=document.getElementById('addBtn');
  if(!name||isNaN(amount)||amount<=0||!date){err.style.display='block';return;}
  err.style.display='none';btn.disabled=true;
  if(editingId){
    btn.innerHTML='<i class="ti ti-loader"></i> Saving…';
    const oldBill=bills.find(b=>b.id===editingId);
    if(oldBill&&oldBill.amount!==amount){
      const s=dayjs(oldBill.date),e=dayjs(tod()).subtract(1,'day');
      if(e.isAfter(s)||e.isSame(s)) occurrencesInRange(oldBill,s,e).forEach(ds=>{const k=occKey(editingId,ds);if(historyAmounts[k]===undefined)historyAmounts[k]=oldBill.amount;});
    }
    await db.doc(`users/${uid}/bills/${editingId}`).update({name,amount,freq,date,cat,dd,fundExclude});
    const idx=bills.findIndex(b=>b.id===editingId);if(idx!==-1)bills[idx]={id:editingId,name,amount,freq,date,cat,dd,fundExclude};
    editingId=null;const cb=document.getElementById('cancelEditBtn');if(cb)cb.remove();
    toast('Bill updated ✓');
  } else {
    btn.innerHTML='<i class="ti ti-loader"></i> Saving…';
    const newId=await addBillFS({name,amount,freq,date,cat,dd,fundExclude});
    bills.push({id:newId,name,amount,freq,date,cat,dd,fundExclude});
    toast('Bill added ✓');
  }
  ['bName','bAmt'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('bFreq').value='fortnightly';document.getElementById('bDate').value=tod();
  document.getElementById('bCat').value='home';document.getElementById('bDD').checked=false;document.getElementById('bExclude').checked=false;
  document.getElementById('addBtn').innerHTML='<i class="ti ti-plus"></i> Add bill';btn.disabled=false;
  await savePaid();renderAll();
}
async function removeBill(id){
  if(!confirm('Remove this bill?')) return;
  await deleteBillFS(id);
  bills=bills.filter(b=>b.id!==id);
  paidKeys=paidKeys.filter(k=>!k.startsWith(id+'_'));ddOvrKeys=ddOvrKeys.filter(k=>!k.startsWith(id+'_'));skippedKeys=skippedKeys.filter(k=>!k.startsWith(id+'_'));
  Object.keys(paidAmounts).forEach(k=>{if(k.startsWith(id+'_'))delete paidAmounts[k];});
  Object.keys(historyAmounts).forEach(k=>{if(k.startsWith(id+'_'))delete historyAmounts[k];});
  await savePaid();renderAll();
}

  ov.innerHTML=`<div class="overlay-card">
    <div class="overlay-top"><h2>📋 Bills list</h2><button class="overlay-close" onclick="document.getElementById('billsExportOv').remove()">✕</button></div>
    <textarea id="billsExportTxt" readonly style="width:100%;font-family:monospace;font-size:11px;line-height:1.5;background:#f5f5f0;border:1px solid #e8e8e0;border-radius:10px;padding:12px;resize:none;color:#1a1a18;white-space:pre" rows="16">${text}</textarea>
    <button class="btn-primary" style="margin-top:12px" onclick="navigator.clipboard.writeText(document.getElementById('billsExportTxt').value).then(()=>toast('Copied ✓'))">
      <i class="ti ti-copy"></i> Copy to clipboard
    </button>
  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.getElementById('billsExportOv')?.remove();document.body.appendChild(ov);
}

if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(console.error));
</script>
</body>
</html>
